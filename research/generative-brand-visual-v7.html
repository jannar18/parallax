<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative Brand Visual — Gallery v7</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f2ede8;
    color: #1e1c1a;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: crosshair;
    -webkit-font-smoothing: antialiased;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }

  .ui-layer {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .brand-mark {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .brand-mark .glyphs {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .brand-mark .glyph {
    width: 12px;
    height: 12px;
    border: 1px solid rgba(30,28,26,0.35);
    transform: rotate(45deg);
    opacity: 0.5;
  }

  .brand-mark .glyph.center {
    width: 16px;
    height: 16px;
    opacity: 0.7;
    position: relative;
  }

  .brand-mark .glyph.center::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(30,28,26,0.35);
  }

  .brand-mark .stem {
    width: 1px;
    height: 28px;
    background: linear-gradient(to bottom, rgba(30,28,26,0.35), transparent);
  }

  .meta-col {
    position: absolute;
    font-size: 8px;
    font-weight: 300;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: rgba(30,28,26,0.22);
    writing-mode: vertical-rl;
    line-height: 1.8;
    white-space: pre;
  }

  .meta-left { left: 28px; top: 50%; transform: translateY(-50%); }
  .meta-right { right: 28px; top: 50%; transform: translateY(-50%) rotate(180deg); }

  .meta-bottom {
    position: absolute;
    bottom: 22px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    font-size: 7.5px;
    font-weight: 300;
    letter-spacing: 3.5px;
    color: rgba(30,28,26,0.16);
    text-transform: uppercase;
  }

  .meta-bottom .sep {
    display: inline-block;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(30,28,26,0.13);
  }

  .hint {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 7.5px;
    font-weight: 300;
    letter-spacing: 3px;
    color: rgba(30,28,26,0.1);
    animation: breathe 4s ease-in-out infinite;
    transition: opacity 0.5s;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.3; }
  }

  @keyframes fadeIn { to { opacity: 1; } }

  @media (max-width: 768px) {
    .meta-left { left: 14px; font-size: 7px; }
    .meta-right { right: 14px; font-size: 7px; }
    .name-lockup { display: none; }
    .meta-bottom { font-size: 6.5px; letter-spacing: 2.5px; gap: 10px; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui-layer">
  <div class="brand-mark">
    <div class="glyphs">
      <div class="glyph"></div>
      <div class="glyph center"></div>
      <div class="glyph"></div>
    </div>
    <div class="stem"></div>
  </div>
  <div class="meta-col meta-left" id="metaLeft"></div>
  <div class="meta-col meta-right" id="metaRight"></div>
  <div class="hint" id="hint">click + drag to merge worlds</div>
  <div class="meta-bottom" id="metaBottom"></div>
</div>

// === WIRE NETWORK ===
function generateWireNetwork() {
  const nodeCount = 90;
  const nodes = [];
  for (let i = 0; i < nodeCount; i++) {
    let nx, ny;
    if (Math.random() < 0.3) {
      nx = 0.35 + (Math.random() - 0.5) * 0.4;
      ny = 0.35 + (Math.random() - 0.5) * 0.4;
    } else {
      nx = 0.06 + Math.random() * 0.88;
      ny = 0.06 + Math.random() * 0.88;
    }
    nodes.push({ nx, ny, phase: Math.random() * Math.PI * 2, reveal: 0, revealTarget: 0, revealDelay: i * 0.2 + Math.random() * 3 });
  }
  const edges = [], maxDist = 0.3, maxE = 4, ec = new Array(nodeCount).fill(0), cands = [];
  for (let i = 0; i < nodeCount; i++)
    for (let j = i + 1; j < nodeCount; j++) {
      const dx = nodes[i].nx - nodes[j].nx, dy = nodes[i].ny - nodes[j].ny, d = Math.sqrt(dx*dx+dy*dy);
      if (d < maxDist) cands.push({ i, j, d });
    }
  cands.sort((a, b) => a.d - b.d);
  for (const c of cands) {
    if (ec[c.i] < maxE && ec[c.j] < maxE) {
      edges.push({ from: c.i, to: c.j, weight: 0.3+Math.random()*0.5, alpha: 0.1+Math.random()*0.3, phase: Math.random()*Math.PI*2, signalPos: Math.random(), signalSpeed: 0.003+Math.random()*0.006, signalDir: Math.random()<0.5?1:-1 });
      ec[c.i]++; ec[c.j]++;
    }
  }
  for (let i = 0; i < 14; i++) {
    const a = Math.floor(Math.random()*nodeCount); let b = Math.floor(Math.random()*nodeCount); while(b===a) b = Math.floor(Math.random()*nodeCount);
    edges.push({ from: a, to: b, weight: 0.2+Math.random()*0.3, alpha: 0.04+Math.random()*0.08, phase: Math.random()*Math.PI*2, signalPos: Math.random(), signalSpeed: 0.002+Math.random()*0.004, signalDir: Math.random()<0.5?1:-1 });
  }
  wireNetwork = { nodes, edges };
}

// === PLANE GEOMETRY ===
// === PLANE GEOMETRY ===
// Think of two planes seen from above on a grid.
// Each plane has a FRONT edge (close to the viewer, at the
// bottom of the screen / outer sides) and a BACK edge (far
// from the viewer, toward center).
//
// The FRONT edges stay fixed — they're the two vertical lines
// you see at rotation=0. As rotation increases, the BACK edges
// fold INWARD toward each other (like closing a book). At ~75%
// rotation they cross through each other.
//
// Front view:
//   rotation=0:  two thin lines (edge-on, front edges only)
//   rotation=0.5: planes angling inward, back edges approaching
//   rotation=0.75: back edges have crossed past each other
//   rotation=1: back edges fully past, planes overlapping heavily

function getLeftPlane() {
  const cx = W * 0.5;
  const topY = H * 0.1;
  const botY = H * 0.9;

  // Front edge — FIXED, stays in place (left side of screen)
  // This is the edge closest to the viewer.
  const frontX = cx - W * 0.35;

  // Back edge — starts at the same X as the front (edge-on),
  // then folds INWARD (toward the right / toward center and beyond).
  // At rotation=0: backX = frontX (edge-on, just a line)
  // At rotation=1: backX has swung far past center
  const maxSwing = W * 0.55; // how far the back edge travels
  const backX = frontX + rotation * maxSwing;

  // Perspective: back edge is slightly shorter (farther away)
  // Front edge is full height, back edge gets compressed toward
  // the center vertically as it recedes.
  const perspAmount = rotation * 0.08;

  return [
    {x: frontX, y: topY},                              // TL (front, fixed)
    {x: backX,  y: topY + H * perspAmount},             // TR (back, folds in)
    {x: backX,  y: botY - H * perspAmount},             // BR (back, folds in)
    {x: frontX, y: botY}                                // BL (front, fixed)
  ];
}

function getRightPlane() {
  const cx = W * 0.5;
  const topY = H * 0.1;
  const botY = H * 0.9;

  // Front edge — FIXED, right side of screen
  const frontX = cx + W * 0.35;

  // Back edge folds INWARD (toward the left / toward center and beyond)
  const maxSwing = W * 0.55;
  const backX = frontX - rotation * maxSwing;

  const perspAmount = rotation * 0.08;

  return [
    {x: backX,  y: topY + H * perspAmount},             // TL (back, folds in)
    {x: frontX, y: topY},                               // TR (front, fixed)
    {x: frontX, y: botY},                               // BR (front, fixed)
    {x: backX,  y: botY - H * perspAmount}              // BL (back, folds in)
  ];
}

function clipToQuad(pts) {
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); ctx.lineTo(pts[1].x,pts[1].y);
  ctx.lineTo(pts[2].x,pts[2].y); ctx.lineTo(pts[3].x,pts[3].y); ctx.closePath(); ctx.clip();
}
function drawPlaneBorder(pts, a) {
  ctx.strokeStyle = `rgba(30,28,26,${a})`; ctx.lineWidth = 0.7;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); ctx.lineTo(pts[1].x,pts[1].y);
  ctx.lineTo(pts[2].x,pts[2].y); ctx.lineTo(pts[3].x,pts[3].y); ctx.closePath(); ctx.stroke();
}
function mapToQuad(nx, ny, pts) {
  const tx = pts[0].x+(pts[1].x-pts[0].x)*nx, ty = pts[0].y+(pts[1].y-pts[0].y)*nx;
  const bx = pts[3].x+(pts[2].x-pts[3].x)*nx, by = pts[3].y+(pts[2].y-pts[3].y)*nx;
  return { x: tx+(bx-tx)*ny, y: ty+(by-ty)*ny };
}

// === PHOTO INTO QUAD — CENTER CROP + PERSPECTIVE SLICING ===
function drawPhotoInQuad(img, pts, alpha) {
  if (!img || !img.complete || img.naturalWidth === 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  clipToQuad(pts);

  const minX = Math.min(pts[0].x,pts[3].x), maxX = Math.max(pts[1].x,pts[2].x);
  const minY = Math.min(pts[0].y,pts[1].y), maxY = Math.max(pts[2].y,pts[3].y);
  const quadW = maxX-minX, quadH = maxY-minY;
  if (quadW <= 0 || quadH <= 0) { ctx.restore(); return; }

  const quadAspect = quadW/quadH, imgAspect = img.naturalWidth/img.naturalHeight;
  let sx, sy, sw, sh;
  if (imgAspect > quadAspect) {
    sh = img.naturalHeight; sw = sh * quadAspect;
    sx = (img.naturalWidth - sw) / 2; sy = 0;
  } else {
    sw = img.naturalWidth; sh = sw / quadAspect;
    sx = 0; sy = (img.naturalHeight - sh) / 2;
  }

  const slices = 80;
  for (let i = 0; i < slices; i++) {
    const t1 = i/slices, t2 = (i+1)/slices;
    const tl = mapToQuad(t1,0,pts), tr = mapToQuad(t2,0,pts);
    const br = mapToQuad(t2,1,pts), bl = mapToQuad(t1,1,pts);
    const sliceSx = sx + t1*sw, sliceSw = sw/slices;
    const dx = Math.min(tl.x,bl.x), dxr = Math.max(tr.x,br.x);
    const dy = Math.min(tl.y,tr.y), dyb = Math.max(bl.y,br.y);
    const dw = dxr-dx, dh = dyb-dy;
    if (dw > 0 && dh > 0 && sliceSw > 0) {
      ctx.drawImage(img, sliceSx, sy, sliceSw, sh, dx, dy, dw, dh);
    }
  }
  ctx.restore();
}

// === LEFT PLANE — SLIDESHOW ===
function updateSlideshow() {
  photoHoldTimer++;
  if (photoHoldTimer > HOLD_DURATION) {
    crossfade += FADE_SPEED;
    if (crossfade >= 1) {
      currentPhoto = nextPhoto;
      nextPhoto = (nextPhoto + 1) % PHOTO_COUNT;
      crossfade = 0;
      photoHoldTimer = 0;
    }
  }
}
function drawLeftPlane() {
  const pts = getLeftPlane();
  const ca = 0.82 * (1-crossfade), na = 0.82 * crossfade;
  if (ca > 0.01) drawPhotoInQuad(photoImages[currentPhoto], pts, ca);
  if (na > 0.01) drawPhotoInQuad(photoImages[nextPhoto], pts, na);
  drawPlaneBorder(pts, 0.12);
}

// === RIGHT PLANE — WIREFRAME ===
function drawRightPlane() {
  const pts = getRightPlane(), net = wireNetwork;
  if (!net) return;
  const px = (mouseX-0.5)*6, py = (mouseY-0.5)*4, ts = frame/60;
  ctx.save(); clipToQuad(pts);

  net.nodes.forEach(n => { if (ts > n.revealDelay) n.revealTarget = 1; n.reveal += (n.revealTarget-n.reveal)*0.06; });

  net.edges.forEach(edge => {
    const nA = net.nodes[edge.from], nB = net.nodes[edge.to];
    const er = Math.min(nA.reveal, nB.reveal);
    if (er < 0.01) return;
    const pA = mapToQuad(nA.nx,nA.ny,pts), pB = mapToQuad(nB.nx,nB.ny,pts);
    const a = Math.min(edge.alpha * er * (0.6+0.2*Math.sin(frame*0.008+edge.phase)) * 1.8, 0.65);
    ctx.strokeStyle = `rgba(30,28,26,${a})`; ctx.lineWidth = edge.weight * 1.2;
    ctx.beginPath(); ctx.moveTo(pA.x+px,pA.y+py); ctx.lineTo(pB.x+px,pB.y+py); ctx.stroke();
    edge.signalPos += edge.signalSpeed * edge.signalDir;
    if (edge.signalPos > 1) { edge.signalPos=1; edge.signalDir=-1; }
    else if (edge.signalPos < 0) { edge.signalPos=0; edge.signalDir=1; }
    const sigX = pA.x+(pB.x-pA.x)*edge.signalPos+px, sigY = pA.y+(pB.y-pA.y)*edge.signalPos+py;
    ctx.fillStyle = `rgba(30,28,26,${Math.min(a*1.2,0.4)*er})`;
    ctx.beginPath(); ctx.arc(sigX,sigY,1.3,0,Math.PI*2); ctx.fill();
  });

  net.nodes.forEach(node => {
    if (node.reveal < 0.01) return;
    const p = mapToQuad(node.nx,node.ny,pts);
    const a = node.reveal * (0.18+0.08*Math.sin(frame*0.01+node.phase));
    ctx.fillStyle = `rgba(30,28,26,${a})`;
    ctx.beginPath(); ctx.arc(p.x+px,p.y+py,1.5,0,Math.PI*2); ctx.fill();
    if (node.phase > Math.PI) {
      ctx.strokeStyle = `rgba(30,28,26,${a*0.4})`; ctx.lineWidth = 0.3;
      ctx.beginPath(); ctx.moveTo(p.x+px-3,p.y+py); ctx.lineTo(p.x+px+3,p.y+py);
      ctx.moveTo(p.x+px,p.y+py-3); ctx.lineTo(p.x+px,p.y+py+3); ctx.stroke();
    }
  });
  ctx.restore();
  drawPlaneBorder(pts, 0.12);
}

// === FIGURE ===
// === MAIN LOOP ===
function draw() {
  frame++;
  mouseX += (targetMX-mouseX)*0.05;
  mouseY += (targetMY-mouseY)*0.05;
  rotation += (targetRotation-rotation)*0.04;
  ctx.fillStyle = '#f2ede8';
  ctx.fillRect(0,0,W,H);
  updateSlideshow();
  drawLeftPlane();
  drawRightPlane();
  if (frame % 30 === 0) setMetadata();
  requestAnimationFrame(draw);
}

// === DRAG ===
function onDown(x) { isDragging=true; dragStartX=x; dragStartRotation=targetRotation; document.getElementById('hint').style.opacity='0'; }
function onMove(x) { if(!isDragging) return; targetRotation = Math.max(0,Math.min(1, dragStartRotation + (x-dragStartX)/(W*0.4))); }
function onUp() { isDragging=false; }

window.addEventListener('mousedown', e => onDown(e.clientX));
window.addEventListener('mousemove', e => { targetMX=e.clientX/W; targetMY=e.clientY/H; onMove(e.clientX); });
window.addEventListener('mouseup', () => onUp());
window.addEventListener('touchstart', e => onDown(e.touches[0].clientX), {passive:true});
window.addEventListener('touchmove', e => { const t=e.touches[0]; targetMX=t.clientX/W; targetMY=t.clientY/H; onMove(t.clientX); e.preventDefault(); }, {passive:false});
window.addEventListener('touchend', () => onUp());
window.addEventListener('resize', resize);
window.addEventListener('dblclick', () => generateWireNetwork());

resize(); setMetadata(); draw();
</script>
</body>
</html>
