<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRACTAL — Sierpinski Photo Carpet (Responsive)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #fdf0d5;
    --red: #cc2936;
    --blue: #1d3557;
    --black: #1a1a1a;
    --dark: #111111;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    color: var(--cream);
  }

  .layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .panel {
    flex: 1;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
    position: relative;
    overflow: hidden;
  }

  .panel-label {
    position: absolute;
    top: 0; left: 0; right: 0;
    font-size: 9px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(253,240,213,0.18);
    padding: 14px 20px 10px;
    text-indent: 6px;
    font-weight: 700;
    z-index: 1;
  }

  #canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    font-size: 9px;
    color: rgba(253,240,213,0.15);
    letter-spacing: 2px;
    padding: 6px 20px;
    border-top: 1px solid #1e1e1e;
    background: var(--dark);
  }
  .stats-bar span { color: rgba(253,240,213,0.35); }

  .controls {
    background: var(--dark);
    border-top: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    gap: 14px;
  }

  .controls button {
    background: none;
    border: 1px solid #333;
    color: rgba(253,240,213,0.5);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 5px 14px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .controls button:hover {
    border-color: var(--red);
    color: var(--red);
  }
  .controls button.on {
    border-color: var(--red);
    color: var(--red);
  }

  #slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: #333;
    outline: none;
    border-radius: 1px;
  }
  #slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--cream);
    cursor: pointer;
    transition: background 0.2s;
  }
  #slider::-webkit-slider-thumb:hover { background: var(--red); }
  #slider::-moz-range-thumb {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--cream);
    border: none;
    cursor: pointer;
  }

  #level-display {
    font-size: 9px;
    color: rgba(253,240,213,0.3);
    letter-spacing: 2px;
    min-width: 90px;
    text-align: right;
    white-space: nowrap;
  }

  .size-display {
    position: absolute;
    bottom: 8px; right: 12px;
    font-size: 9px;
    color: rgba(253,240,213,0.12);
    letter-spacing: 1px;
    z-index: 1;
    pointer-events: none;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.92; }
    50%      { opacity: 1; }
  }
  .streaming #canvas {
    animation: breathe 6s ease-in-out infinite;
  }

  /* ── Mobile ─────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .panel-label {
      font-size: 8px;
      letter-spacing: 4px;
      padding: 10px 14px 8px;
    }

    .stats-bar {
      gap: 16px;
      font-size: 8px;
      padding: 6px 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls {
      padding: 10px 12px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls button {
      font-size: 9px;
      padding: 8px 14px;
    }

    #slider {
      min-width: 0;
      width: 100%;
      flex: 1 1 100%;
      order: 10;
      height: 4px;
    }
    #slider::-webkit-slider-thumb {
      width: 20px; height: 20px;
    }
    #slider::-moz-range-thumb {
      width: 20px; height: 20px;
    }

    #level-display {
      font-size: 8px;
      min-width: auto;
      order: 11;
      width: 100%;
      text-align: center;
    }

    .size-display {
      font-size: 8px;
    }
  }
</style>
</head>
<body>

<div class="layout">
  <div class="panel">
    <div class="panel-label">Photo Carpet — Responsive</div>
    <canvas id="canvas"></canvas>
    <div class="size-display" id="size-display"></div>
  </div>

  <div class="stats-bar">
    <div>TEXT <span id="stat-text">0</span></div>
    <div>PHOTO <span id="stat-photo">0</span></div>
    <div>CELLS <span id="stat-total">0</span></div>
    <div>DEPTH <span id="stat-depth">0</span></div>
  </div>

  <div class="controls">
    <button id="play-btn">PLAY</button>
    <button id="reset-btn">RESET</button>
    <input type="range" id="slider" min="0" max="4" step="0.01" value="0">
    <span id="level-display">LEVEL 0 / 4</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  QUOTES
// ═══════════════════════════════════════════════════════════════
const QUOTES = [
  "THE GOLDEN AGE IS ALREADY IN THE COMPUTER",
  "ALL WE HAVE TO DO IS ARRANGE THE MARKDOWN FILES",
  "A SMALL GROUP OF PEOPLE WHO SHARE CONTEXT DEEPLY LIVE NEAR EACH OTHER AND BUILD TOOLS FOR EACH OTHER CAN MOVE DRAMATICALLY FASTER THAN INDIVIDUALS WORKING ALONE",
  "IT IS NOT A COMPANY IT IS NOT AN APP IT IS AN OPEN SOURCE GOLDEN AGE PROTOCOL",
  "A REPLICABLE ARRANGEMENT OF KNOWLEDGE RELATIONSHIPS AND INFRASTRUCTURE",
  "DON'T BUILD POLISHED APPS LAY OUT ALL THE RAW MATERIAL",
  "EVERYONE ALREADY HAS THEIR OWN AI AGENT WHAT THEY LACK IS PARTS",
  "YOUR CLAUDE TALKS TO THE JUNKYARD MY CLAUDE TALKS TO THE JUNKYARD THE JUNKYARD IS THE THIRD BRAIN",
  "IF IT FEELS LIKE A CHORE YOU'RE DOING IT WRONG IF IT FEELS LIKE A NEW MINECRAFT WORLD YOU'RE DOING IT RIGHT",
  "SOCIAL TECHNOLOGY IS NOW FORKABLE ANYONE CAN FORK IT AND HOST THEIR OWN VERSION ANYWHERE IN THE WORLD",
  "THE CONFIG IS THE LESSON",
  "GAIN OF FUNCTION RESEARCH ON THE GOLDEN AGE VIRUS",
  "MODERNITY ACTS LIKE A CENTRIFUGE SEPARATING PEOPLE BY AGE INCOME INTEREST GEOGRAPHY",
  "THE ANTIDOTE IS INTENTIONAL INSTITUTIONS THAT RE-MINGLE WHAT THE CENTRIFUGE HAS SEPARATED",
  "SPEEDRUNNING PEOPLE TOWARDS LIFE FULFILLMENT",
  "A GROUP OF FRIENDS CAN WRITE A SINGLE MARKDOWN FILE AND INFLUENCE MILLIONS OF LIVES OVERNIGHT",
  "IT SHOULD FEEL LIKE LOGGING INTO A WORLD NOT OPENING A DASHBOARD",
  "THINK XEROX PARC THINK THE MANHATTAN PROJECT",
  "YOU'RE A WIZARD NOW HARRY",
  "TAKING THE FRACTAL PILL SHOULD JUST BE PUTTING A MARKDOWN FILE AT YOUR TOP",
  "A ZIP FILE YOU CAN OPEN ANYWHERE AND TALK TO",
  "PLAY FRACTAL",
  "THE MMO",
  "ONCE SOMEONE HAS SOLVED THEIR OWN PROBLEMS THEIR LOCUS OF CONCERN NATURALLY EXPANDS OUTWARD",
  "100000 PEOPLE WHO HAVE FOUND DEEP LIFE SATISFACTION AND ARE READY FOR THE NEXT THING WHAT DO THEY DO TOGETHER",
  "FRACTAL IS FIVE INTERCONNECTED INSTITUTIONS SHARING A PHYSICAL SPACE IN WILLIAMSBURG BROOKLYN",
  "METRICS AS COWARDICE",
  "THE COOPERATION MACHINE",
  "TYRANNY OF THE MARGINAL USER",
  "LIBERATING ARTS ENVIRONMENTS THAT LIBERATE THE SPIRIT AND ENCOURAGE EXPERIMENTATION",
  "HOW DO WE BUILD A GOLDEN AGE STARTING WITH OUR FRIENDS",
  "THE DEEPER GAME THE NETWORK IS SPEEDRUNNING PEOPLE TOWARDS LIFE FULFILLMENT",
  "COMPOUND ENGINEERING EVERY UNIT OF WORK MAKES THE NEXT EASIER",
  "FRACTAL TORONTO APPEARED SPONTANEOUSLY",
  "A SKILLS AS PAMPHLETS THESIS",
  "THE PEDAGOGY IS MONTESSORI DERIVED THE LIBERATING ARTS"
];

const SEP = " · ";
const fullText = QUOTES.join(SEP);
const textLen = fullText.length;

// ═══════════════════════════════════════════════════════════════
//  SIERPINSKI CARPET
// ═══════════════════════════════════════════════════════════════
const MAX_LEVEL = 4;
const SIZE = 3 ** MAX_LEVEL; // 81

const holeLevels = new Uint8Array(SIZE * SIZE);

for (let y = 0; y < SIZE; y++) {
  for (let x = 0; x < SIZE; x++) {
    for (let r = 1; r <= MAX_LEVEL; r++) {
      const i = MAX_LEVEL - r + 1;
      const p = 3 ** i;
      const third = p / 3;
      if (Math.floor((x % p) / third) === 1 &&
          Math.floor((y % p) / third) === 1) {
        holeLevels[y * SIZE + x] = r;
        break;
      }
    }
  }
}

const filledAtLevel = [];
for (let lvl = 0; lvl <= MAX_LEVEL; lvl++) {
  let c = 0;
  for (let k = 0; k < SIZE * SIZE; k++) {
    if (holeLevels[k] === 0 || holeLevels[k] > lvl) c++;
  }
  filledAtLevel[lvl] = c;
}

function cellFilled(idx, progress) {
  const hl = holeLevels[idx];
  if (hl === 0) return true;
  const fullLvl = Math.floor(progress);
  if (hl <= fullLvl) return false;
  const frac = progress - fullLvl;
  if (hl === fullLvl + 1 && frac > 0) {
    const x = idx % SIZE, y = (idx / SIZE) | 0;
    const h = ((x * 7919 + y * 104729 + hl * 31) & 0x7FFFFFFF) % 1000;
    return h >= (frac * 1000) | 0;
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════
//  PHOTO
// ═══════════════════════════════════════════════════════════════
const photo = new Image();
photo.onload = () => updateDisplay();
photo.src = 'hero-square.png';

// ═══════════════════════════════════════════════════════════════
//  CANVAS — fills entire panel, non-square cells
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const sizeEl = document.getElementById('size-display');

let cellW = 0, cellH = 0;
let totalW = 0, totalH = 0;

function resizeCanvas() {
  const panel = document.querySelector('.panel');
  totalW = panel.clientWidth;
  totalH = panel.clientHeight;

  cellW = totalW / SIZE;
  cellH = totalH / SIZE;

  const dpr = window.devicePixelRatio || 1;
  canvas.width  = totalW * dpr;
  canvas.height = totalH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  sizeEl.textContent = `${totalW}×${totalH}  CELL ${cellW.toFixed(1)}×${cellH.toFixed(1)}`;
}

// ═══════════════════════════════════════════════════════════════
//  DRAW — stretches to fill any aspect ratio
// ═══════════════════════════════════════════════════════════════
function draw(progress) {
  if (!totalW) return;

  const hasPhoto = photo.complete && photo.naturalWidth;
  const fontSize = Math.max(4, Math.min(cellW, cellH) * 0.82);
  const halfW = cellW / 2;
  const halfH = cellH / 2;

  // ── 1. Dark base ─────────────────────────────────────────
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, totalW, totalH);

  // ── 2. Photo into hole cells ─────────────────────────────
  if (progress > 0 && hasPhoto) {
    ctx.save();
    ctx.beginPath();
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (!cellFilled(y * SIZE + x, progress)) {
          ctx.rect(x * cellW, y * cellH, cellW, cellH);
        }
      }
    }
    ctx.clip();
    // Cover-scale photo to the full canvas rectangle
    const scale = Math.max(totalW / photo.naturalWidth, totalH / photo.naturalHeight);
    const dw = photo.naturalWidth * scale;
    const dh = photo.naturalHeight * scale;
    ctx.drawImage(photo, (totalW - dw) / 2, (totalH - dh) / 2, dw, dh);
    ctx.restore();
  }

  // ── 3. Text on filled cells ──────────────────────────────
  ctx.fillStyle    = 'rgba(253, 240, 213, 0.88)';
  ctx.font         = `${fontSize}px 'Space Mono','Courier New',monospace`;
  ctx.textBaseline = 'middle';
  ctx.textAlign    = 'center';

  let ci = ((textOffset % textLen) + textLen) % textLen;

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (cellFilled(y * SIZE + x, progress)) {
        ctx.fillText(fullText[ci], x * cellW + halfW, y * cellH + halfH);
        ci = (ci + 1) % textLen;
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  STATE + ANIMATION
// ═══════════════════════════════════════════════════════════════
let progress   = 0;
let textOffset = 0;
let playing    = false;
let phase      = 'grow';

const slider    = document.getElementById('slider');
const playBtn   = document.getElementById('play-btn');
const resetBtn  = document.getElementById('reset-btn');
const levelDisp = document.getElementById('level-display');
const statText  = document.getElementById('stat-text');
const statPhoto = document.getElementById('stat-photo');
const statTotal = document.getElementById('stat-total');
const statDepth = document.getElementById('stat-depth');

statTotal.textContent = SIZE * SIZE;

function approxFilled(p) {
  if (p <= 0) return SIZE * SIZE;
  const full = Math.floor(p);
  if (full >= MAX_LEVEL) return filledAtLevel[MAX_LEVEL];
  const frac = p - full;
  return Math.round(
    filledAtLevel[full] + (filledAtLevel[full + 1] - filledAtLevel[full]) * frac
  );
}

function updateDisplay() {
  draw(progress);

  const textCells  = approxFilled(progress);
  const photoCells = SIZE * SIZE - textCells;

  statText.textContent  = textCells;
  statPhoto.textContent = photoCells;
  statDepth.textContent = progress.toFixed(2);
  levelDisp.textContent = 'LEVEL ' + progress.toFixed(1) + ' / ' + MAX_LEVEL;

  document.body.classList.toggle('streaming', phase === 'stream' && playing);
}

let lastTime  = 0;
let streamAcc = 0;

function tick(now) {
  requestAnimationFrame(tick);
  if (!playing) { lastTime = now; return; }

  const dt = Math.min(now - lastTime, 50);
  lastTime = now;

  if (phase === 'grow') {
    progress += dt * 0.0004;
    if (progress >= MAX_LEVEL) {
      progress = MAX_LEVEL;
      phase    = 'stream';
      streamAcc = 0;
    }
    slider.value = progress;
    updateDisplay();
  } else if (phase === 'stream') {
    streamAcc += dt;
    if (streamAcc > 120) {
      textOffset++;
      streamAcc -= 120;
      updateDisplay();
    }
  }
}
requestAnimationFrame(tick);

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? 'PAUSE' : 'PLAY';
  playBtn.classList.toggle('on', playing);
  if (playing && progress >= MAX_LEVEL) phase = 'stream';
  else if (playing) phase = 'grow';
});

resetBtn.addEventListener('click', () => {
  progress   = 0;
  textOffset = 0;
  phase      = 'grow';
  slider.value = 0;
  playing    = false;
  playBtn.textContent = 'PLAY';
  playBtn.classList.remove('on');
  updateDisplay();
});

slider.addEventListener('input', () => {
  progress = parseFloat(slider.value);
  phase    = progress >= MAX_LEVEL ? 'stream' : 'grow';
  updateDisplay();
});

// ═══════════════════════════════════════════════════════════════
//  INIT — resize on every frame for smooth response
// ═══════════════════════════════════════════════════════════════
let lastW = 0, lastH = 0;
function checkResize() {
  const panel = document.querySelector('.panel');
  const pw = panel.clientWidth;
  const ph = panel.clientHeight;
  if (pw !== lastW || ph !== lastH) {
    lastW = pw;
    lastH = ph;
    resizeCanvas();
    updateDisplay();
  }
  requestAnimationFrame(checkResize);
}

resizeCanvas();
updateDisplay();
requestAnimationFrame(checkResize);
</script>
</body>
</html>
