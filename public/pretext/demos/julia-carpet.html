<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRACTAL — Julia Set Carpet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #fdf0d5;
    --red: #cc2936;
    --blue: #1d3557;
    --black: #1a1a1a;
    --dark: #111111;
    --gutter: #161616;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    color: var(--cream);
  }

  /* ── Layout ─────────────────────────────────────────────── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr auto auto;
    height: 100vh;
  }

  /* ── Panels ─────────────────────────────────────────────── */
  .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .panel-label {
    position: absolute;
    top: 0; left: 0; right: 0;
    font-size: 9px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(253,240,213,0.18);
    padding: 14px 20px 10px;
    text-indent: 6px;
    font-weight: 700;
    z-index: 1;
  }

  /* ── Left: Source Field (canvas) ────────────────────────── */
  .field-panel {
    background: var(--gutter);
    border-right: 1px solid #2a2a2a;
  }

  #field-canvas {
    image-rendering: auto;
  }

  /* ── Right: ASCII Carpet ────────────────────────────────── */
  .carpet-panel {
    background: var(--black);
  }

  #carpet {
    font-family: 'Space Mono', 'Courier New', monospace;
    color: var(--cream);
    white-space: pre;
    line-height: 1.0;
    letter-spacing: 0;
    user-select: none;
    font-variant-ligatures: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Stats ──────────────────────────────────────────────── */
  .stats-bar {
    grid-column: 1 / -1;
    display: flex;
    justify-content: center;
    gap: 32px;
    font-size: 9px;
    color: rgba(253,240,213,0.15);
    letter-spacing: 2px;
    padding: 6px 20px;
    border-top: 1px solid #1e1e1e;
    background: var(--dark);
  }
  .stats-bar span { color: rgba(253,240,213,0.35); }

  /* ── Controls ───────────────────────────────────────────── */
  .controls {
    grid-column: 1 / -1;
    background: var(--dark);
    border-top: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .controls button {
    background: none;
    border: 1px solid #333;
    color: rgba(253,240,213,0.5);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .controls button:hover {
    border-color: var(--red);
    color: var(--red);
  }
  .controls button.on {
    border-color: var(--red);
    color: var(--red);
  }

  .spacer { width: 1px; height: 20px; background: #2a2a2a; }

  #slider {
    flex: 1;
    min-width: 120px;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: #333;
    outline: none;
    border-radius: 1px;
  }
  #slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--cream);
    cursor: pointer;
    transition: background 0.2s;
  }
  #slider::-webkit-slider-thumb:hover { background: var(--red); }
  #slider::-moz-range-thumb {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--cream);
    border: none;
    cursor: pointer;
  }

  #level-display {
    font-size: 9px;
    color: rgba(253,240,213,0.3);
    letter-spacing: 2px;
    min-width: 90px;
    text-align: right;
    white-space: nowrap;
  }

  /* ── Breathing ──────────────────────────────────────────── */
  @keyframes breathe {
    0%, 100% { opacity: 0.88; }
    50% { opacity: 1; }
  }
  .streaming #carpet {
    animation: breathe 6s ease-in-out infinite;
  }

  /* ── Mobile ─────────────────────────────────────────────── */
  @media (max-width: 768px) {
    html, body { overflow-y: auto; }

    .layout {
      grid-template-columns: 1fr;
      grid-template-rows: 50vh 50vh auto auto;
      height: auto;
      min-height: 100vh;
    }

    .field-panel {
      border-right: none;
      border-bottom: 1px solid #2a2a2a;
    }

    .panel-label {
      font-size: 8px;
      letter-spacing: 4px;
      padding: 10px 14px 8px;
    }

    .stats-bar {
      gap: 12px;
      font-size: 8px;
      padding: 6px 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls {
      padding: 10px 12px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .controls button {
      font-size: 9px;
      padding: 8px 10px;
      letter-spacing: 1px;
    }

    .spacer { display: none; }

    .preset {
      flex: 1 1 auto;
      text-align: center;
      min-width: 0;
    }

    #slider {
      min-width: 0;
      width: 100%;
      flex: 1 1 100%;
      order: 10;
      height: 4px;
    }
    #slider::-webkit-slider-thumb {
      width: 20px; height: 20px;
    }
    #slider::-moz-range-thumb {
      width: 20px; height: 20px;
    }

    #level-display {
      font-size: 8px;
      min-width: auto;
      order: 11;
      width: 100%;
      text-align: center;
    }
  }
</style>
</head>
<body>

<div class="layout">
  <div class="panel field-panel">
    <div class="panel-label">Source Field</div>
    <canvas id="field-canvas"></canvas>
  </div>

  <div class="panel carpet-panel">
    <div class="panel-label">ASCII Carpet</div>
    <pre id="carpet"></pre>
  </div>

  <div class="stats-bar">
    <div>FILLED <span id="stat-filled">0</span> / <span id="stat-total">0</span></div>
    <div>ITER <span id="stat-iter">0</span></div>
    <div>c = <span id="stat-c">-0.7 + 0.27i</span></div>
  </div>

  <div class="controls">
    <button id="play-btn">PLAY</button>
    <button id="reset-btn">RESET</button>
    <div class="spacer"></div>
    <button class="preset on" data-idx="0">DENDRITE</button>
    <button class="preset" data-idx="1">SPIRAL</button>
    <button class="preset" data-idx="2">TWIST</button>
    <button class="preset" data-idx="3">RABBIT</button>
    <div class="spacer"></div>
    <input type="range" id="slider" min="0" max="4" step="0.01" value="0">
    <span id="level-display">LEVEL 0 / 4</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  QUOTES — from fractal-nyc-website-synthesis.md
// ═══════════════════════════════════════════════════════════════
const QUOTES = [
  "THE GOLDEN AGE IS ALREADY IN THE COMPUTER",
  "ALL WE HAVE TO DO IS ARRANGE THE MARKDOWN FILES",
  "A SMALL GROUP OF PEOPLE WHO SHARE CONTEXT DEEPLY LIVE NEAR EACH OTHER AND BUILD TOOLS FOR EACH OTHER CAN MOVE DRAMATICALLY FASTER THAN INDIVIDUALS WORKING ALONE",
  "IT IS NOT A COMPANY IT IS NOT AN APP IT IS AN OPEN SOURCE GOLDEN AGE PROTOCOL",
  "A REPLICABLE ARRANGEMENT OF KNOWLEDGE RELATIONSHIPS AND INFRASTRUCTURE",
  "DON'T BUILD POLISHED APPS LAY OUT ALL THE RAW MATERIAL",
  "EVERYONE ALREADY HAS THEIR OWN AI AGENT WHAT THEY LACK IS PARTS",
  "YOUR CLAUDE TALKS TO THE JUNKYARD MY CLAUDE TALKS TO THE JUNKYARD THE JUNKYARD IS THE THIRD BRAIN",
  "IF IT FEELS LIKE A CHORE YOU'RE DOING IT WRONG IF IT FEELS LIKE A NEW MINECRAFT WORLD YOU'RE DOING IT RIGHT",
  "SOCIAL TECHNOLOGY IS NOW FORKABLE ANYONE CAN FORK IT AND HOST THEIR OWN VERSION ANYWHERE IN THE WORLD",
  "THE CONFIG IS THE LESSON",
  "GAIN OF FUNCTION RESEARCH ON THE GOLDEN AGE VIRUS",
  "MODERNITY ACTS LIKE A CENTRIFUGE SEPARATING PEOPLE BY AGE INCOME INTEREST GEOGRAPHY",
  "THE ANTIDOTE IS INTENTIONAL INSTITUTIONS THAT RE-MINGLE WHAT THE CENTRIFUGE HAS SEPARATED",
  "SPEEDRUNNING PEOPLE TOWARDS LIFE FULFILLMENT",
  "A GROUP OF FRIENDS CAN WRITE A SINGLE MARKDOWN FILE AND INFLUENCE MILLIONS OF LIVES OVERNIGHT",
  "IT SHOULD FEEL LIKE LOGGING INTO A WORLD NOT OPENING A DASHBOARD",
  "THINK XEROX PARC THINK THE MANHATTAN PROJECT",
  "YOU'RE A WIZARD NOW HARRY",
  "TAKING THE FRACTAL PILL SHOULD JUST BE PUTTING A MARKDOWN FILE AT YOUR TOP",
  "A ZIP FILE YOU CAN OPEN ANYWHERE AND TALK TO",
  "PLAY FRACTAL",
  "THE MMO",
  "ONCE SOMEONE HAS SOLVED THEIR OWN PROBLEMS THEIR LOCUS OF CONCERN NATURALLY EXPANDS OUTWARD",
  "100000 PEOPLE WHO HAVE FOUND DEEP LIFE SATISFACTION AND ARE READY FOR THE NEXT THING WHAT DO THEY DO TOGETHER",
  "FRACTAL IS FIVE INTERCONNECTED INSTITUTIONS SHARING A PHYSICAL SPACE IN WILLIAMSBURG BROOKLYN",
  "METRICS AS COWARDICE",
  "THE COOPERATION MACHINE",
  "TYRANNY OF THE MARGINAL USER",
  "LIBERATING ARTS ENVIRONMENTS THAT LIBERATE THE SPIRIT AND ENCOURAGE EXPERIMENTATION",
  "HOW DO WE BUILD A GOLDEN AGE STARTING WITH OUR FRIENDS",
  "THE DEEPER GAME THE NETWORK IS SPEEDRUNNING PEOPLE TOWARDS LIFE FULFILLMENT",
  "COMPOUND ENGINEERING EVERY UNIT OF WORK MAKES THE NEXT EASIER",
  "FRACTAL TORONTO APPEARED SPONTANEOUSLY",
  "A SKILLS AS PAMPHLETS THESIS",
  "THE PEDAGOGY IS MONTESSORI DERIVED THE LIBERATING ARTS"
];

const SEP = " · ";
const fullText = QUOTES.join(SEP);
const textLen = fullText.length;

// ═══════════════════════════════════════════════════════════════
//  JULIA SET — configuration
// ═══════════════════════════════════════════════════════════════
const PRESETS = [
  { name: 'DENDRITE', cr: -0.7,   ci: 0.27015 },
  { name: 'SPIRAL',   cr: 0.285,  ci: 0.01 },
  { name: 'TWIST',    cr: -0.8,   ci: 0.156 },
  { name: 'RABBIT',   cr: -0.4,   ci: 0.6 },
];

const PREMAX  = 256;            // max precomputed iterations
const COLS    = 100;            // text grid columns
const ROWS    = 50;             // text grid rows
const CW      = 500;            // canvas pixel width
const CH      = 400;            // canvas pixel height
const XMIN    = -1.5, XMAX = 1.5;
const YMIN    = -1.2, YMAX = 1.2;

let curPreset = 0;
let cr = PRESETS[0].cr;
let ci = PRESETS[0].ci;

// ═══════════════════════════════════════════════════════════════
//  ESCAPE TIME — core Julia iteration
// ═══════════════════════════════════════════════════════════════
function escapeTime(zr, zi, maxIter) {
  let r = zr, im = zi;
  for (let n = 0; n < maxIter; n++) {
    const r2 = r * r, i2 = im * im;
    if (r2 + i2 > 4) return n;
    im = 2 * r * im + ci;
    r = r2 - i2 + cr;
  }
  return maxIter;
}

// ═══════════════════════════════════════════════════════════════
//  PRECOMPUTE — escape iterations for canvas + text grid
// ═══════════════════════════════════════════════════════════════
let canvasIters = new Uint16Array(CW * CH);
let textIters   = new Uint16Array(COLS * ROWS);

function precompute() {
  // Canvas pixels
  for (let py = 0; py < CH; py++) {
    const zi = YMIN + (py / (CH - 1)) * (YMAX - YMIN);
    for (let px = 0; px < CW; px++) {
      const zr = XMIN + (px / (CW - 1)) * (XMAX - XMIN);
      canvasIters[py * CW + px] = escapeTime(zr, zi, PREMAX);
    }
  }
  // Text grid
  for (let row = 0; row < ROWS; row++) {
    const zi = YMIN + (row / (ROWS - 1)) * (YMAX - YMIN);
    for (let col = 0; col < COLS; col++) {
      const zr = XMIN + (col / (COLS - 1)) * (XMAX - XMIN);
      textIters[row * COLS + col] = escapeTime(zr, zi, PREMAX);
    }
  }
}

precompute();

// ═══════════════════════════════════════════════════════════════
//  SLIDER → ITERATION THRESHOLD (exponential mapping)
// ═══════════════════════════════════════════════════════════════
//  progress 0 → threshold 1,  progress 4 → threshold 256
function progressToThreshold(p) {
  return Math.max(1, Math.round(Math.pow(2, 2 * p)));
}

// ═══════════════════════════════════════════════════════════════
//  COLOR PALETTE — brand colors mapped to escape time
// ═══════════════════════════════════════════════════════════════
function lerp(a, b, t) { return a + (b - a) * t; }

function lerpRGB(c1, c2, t) {
  return [
    Math.round(lerp(c1[0], c2[0], t)),
    Math.round(lerp(c1[1], c2[1], t)),
    Math.round(lerp(c1[2], c2[2], t))
  ];
}

const COLOR_STOPS = [
  { t: 0.00, rgb: [17, 17, 17] },      // near-black
  { t: 0.08, rgb: [40, 20, 24] },
  { t: 0.22, rgb: [204, 41, 54] },      // red
  { t: 0.42, rgb: [140, 30, 60] },
  { t: 0.55, rgb: [29, 53, 87] },       // blue
  { t: 0.72, rgb: [60, 100, 140] },
  { t: 0.88, rgb: [160, 180, 190] },
  { t: 1.00, rgb: [220, 215, 200] },    // near-cream
];

const palette = [];
for (let i = 0; i < PREMAX; i++) {
  const t = i / PREMAX;
  let j = 0;
  while (j < COLOR_STOPS.length - 2 && COLOR_STOPS[j + 1].t < t) j++;
  const s0 = COLOR_STOPS[j], s1 = COLOR_STOPS[j + 1];
  const lt = s0.t === s1.t ? 0 : (t - s0.t) / (s1.t - s0.t);
  palette.push(lerpRGB(s0.rgb, s1.rgb, Math.min(lt, 1)));
}
// In-set color
const IN_SET_RGB = [253, 240, 213]; // cream

// ═══════════════════════════════════════════════════════════════
//  LEFT PANEL — draw Julia set geometry on canvas
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('field-canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = CW;
canvas.height = CH;

function drawField(threshold) {
  const img  = ctx.createImageData(CW, CH);
  const data = img.data;

  for (let i = 0; i < CW * CH; i++) {
    const iter = canvasIters[i];
    const px   = i * 4;

    if (iter >= threshold) {
      // In-set at this threshold → cream
      data[px]     = IN_SET_RGB[0];
      data[px + 1] = IN_SET_RGB[1];
      data[px + 2] = IN_SET_RGB[2];
    } else {
      // Escaped → color by escape time
      const c = palette[iter];
      data[px]     = c[0];
      data[px + 1] = c[1];
      data[px + 2] = c[2];
    }
    data[px + 3] = 255;
  }

  ctx.putImageData(img, 0, 0);
}

// ═══════════════════════════════════════════════════════════════
//  RIGHT PANEL — ASCII text mapped onto Julia set
// ═══════════════════════════════════════════════════════════════
const carpetEl = document.getElementById('carpet');

function renderCarpet(threshold, textOffset) {
  const off = ((textOffset % textLen) + textLen) % textLen;
  let ch = off;
  const buf = [];

  for (let row = 0; row < ROWS; row++) {
    let line = '';
    const ri = row * COLS;
    for (let col = 0; col < COLS; col++) {
      if (textIters[ri + col] >= threshold) {
        line += fullText[ch];
        ch = (ch + 1) % textLen;
      } else {
        line += ' ';
      }
    }
    buf.push(line);
  }
  return buf.join('\n');
}

function resizeCarpet() {
  const panel = document.querySelector('.carpet-panel');
  const isMobile = window.innerWidth <= 768;
  const maxW  = panel.clientWidth - (isMobile ? 16 : 40);
  const maxH  = panel.clientHeight - (isMobile ? 30 : 50);
  const fzW   = maxW / (COLS * 0.602);
  const fzH   = maxH / ROWS;
  carpetEl.style.fontSize = Math.max(3, Math.min(fzW, fzH, 16)).toFixed(2) + 'px';
}

function resizeCanvas() {
  const panel = document.querySelector('.field-panel');
  const isMobile = window.innerWidth <= 768;
  const pad   = isMobile ? 24 : 60;
  const maxW  = panel.clientWidth - pad;
  const maxH  = panel.clientHeight - pad;
  // Maintain canvas aspect ratio (CW:CH)
  const scale = Math.min(maxW / CW, maxH / CH);
  canvas.style.width  = Math.floor(CW * scale) + 'px';
  canvas.style.height = Math.floor(CH * scale) + 'px';
}

// ═══════════════════════════════════════════════════════════════
//  STATE + ANIMATION
// ═══════════════════════════════════════════════════════════════
let progress   = 0;
let textOffset = 0;
let playing    = false;
let phase      = 'grow';

const slider     = document.getElementById('slider');
const playBtn    = document.getElementById('play-btn');
const resetBtn   = document.getElementById('reset-btn');
const levelDisp  = document.getElementById('level-display');
const statFilled = document.getElementById('stat-filled');
const statTotal  = document.getElementById('stat-total');
const statIter   = document.getElementById('stat-iter');
const statC      = document.getElementById('stat-c');

statTotal.textContent = COLS * ROWS;

function countFilled(threshold) {
  let c = 0;
  for (let i = 0; i < COLS * ROWS; i++) {
    if (textIters[i] >= threshold) c++;
  }
  return c;
}

function updateDisplay() {
  const threshold = progressToThreshold(progress);

  drawField(threshold);
  carpetEl.textContent = renderCarpet(threshold, textOffset);

  const fc = countFilled(threshold);
  statFilled.textContent = fc;
  statIter.textContent   = threshold;
  levelDisp.textContent  = 'LEVEL ' + progress.toFixed(1) + ' / 4';

  document.body.classList.toggle('streaming', phase === 'stream' && playing);
}

let lastTime  = 0;
let streamAcc = 0;

function tick(now) {
  requestAnimationFrame(tick);
  if (!playing) { lastTime = now; return; }

  const dt = Math.min(now - lastTime, 50);
  lastTime = now;

  if (phase === 'grow') {
    progress += dt * 0.0004;
    if (progress >= 4) {
      progress = 4;
      phase = 'stream';
      streamAcc = 0;
    }
    slider.value = progress;
    updateDisplay();
  } else if (phase === 'stream') {
    streamAcc += dt;
    if (streamAcc > 120) {
      textOffset++;
      streamAcc -= 120;
      updateDisplay();
    }
  }
}
requestAnimationFrame(tick);

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? 'PAUSE' : 'PLAY';
  playBtn.classList.toggle('on', playing);
  if (playing && progress >= 4) phase = 'stream';
  else if (playing) phase = 'grow';
});

resetBtn.addEventListener('click', () => {
  progress = 0;
  textOffset = 0;
  phase = 'grow';
  slider.value = 0;
  playing = false;
  playBtn.textContent = 'PLAY';
  playBtn.classList.remove('on');
  updateDisplay();
});

slider.addEventListener('input', () => {
  progress = parseFloat(slider.value);
  phase = progress >= 4 ? 'stream' : 'grow';
  updateDisplay();
});

// ── Preset buttons ──
function formatC(cr, ci) {
  const sign = ci >= 0 ? '+' : '-';
  return cr.toFixed(3) + ' ' + sign + ' ' + Math.abs(ci).toFixed(3) + 'i';
}

document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = parseInt(btn.dataset.idx);
    if (idx === curPreset) return;
    curPreset = idx;
    cr = PRESETS[idx].cr;
    ci = PRESETS[idx].ci;
    statC.textContent = formatC(cr, ci);

    // Update active button
    document.querySelectorAll('.preset').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');

    // Recompute
    precompute();

    // Re-render at current progress
    updateDisplay();
  });
});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
statC.textContent = formatC(cr, ci);
resizeCanvas();
resizeCarpet();
updateDisplay();

window.addEventListener('resize', () => {
  resizeCanvas();
  resizeCarpet();
  updateDisplay();
});
</script>
</body>
</html>
